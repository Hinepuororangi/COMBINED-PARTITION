<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Combined Partition OS</title>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
  :root {
    --river: #1E3A3A;
    --river-light: #2F5454;
    --clay: #8C5A3C;
    --stone: #F2EEE6;
    --paper: #FBFAF7;
    --ink: #22221F;
    --muted: #6E6A61;
    --verified: #2E6B4F;
    --verified-bg: #E6F0EA;
    --unverified: #A24A2F;
    --unverified-bg: #F5E6DE;
    --secondary: #7A6A50;
    --secondary-bg: #EFE9DD;
    --border: #E1DAC9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 520px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
  header.top {
    background: var(--river);
    color: white;
    padding: 20px 18px 16px;
  }
  header.top h1 { margin: 0; font-size: 19px; font-weight: 700; letter-spacing: 0.2px; }
  header.top .sub { margin-top: 3px; font-size: 12.5px; opacity: 0.75; }
  .content { flex: 1; padding: 16px; padding-bottom: 90px; }
  nav.tabs {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 520px; background: white;
    border-top: 1px solid var(--border);
    display: flex; padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
  }
  nav.tabs button {
    flex: 1; background: none; border: none; padding: 8px 4px;
    font-size: 11.5px; color: var(--muted); font-weight: 600;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; border-radius: 10px;
  }
  nav.tabs button.active { color: var(--river); background: var(--stone); }
  nav.tabs .icon { font-size: 18px; }

  .card {
    background: white; border: 1px solid var(--border); border-radius: 12px;
    padding: 14px; margin-bottom: 12px;
  }
  .card h2 { margin: 0 0 4px; font-size: 15px; }
  .row { display: flex; justify-content: space-between; align-items: center; }
  .stat-big { font-size: 30px; font-weight: 800; color: var(--river); line-height: 1; }
  .stat-label { font-size: 11.5px; color: var(--muted); margin-top: 4px; }

  .stage-bar { display: flex; gap: 3px; margin: 10px 0 6px; }
  .stage-seg { flex: 1; height: 6px; border-radius: 3px; background: var(--border); }
  .stage-seg.done { background: var(--verified); }
  .stage-seg.current { background: var(--river); }

  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10.5px; font-weight: 700; padding: 3px 8px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .pill.verified { background: var(--verified-bg); color: var(--verified); }
  .pill.unverified { background: var(--unverified-bg); color: var(--unverified); }
  .pill.secondary { background: var(--secondary-bg); color: var(--secondary); }
  .pill.status-blocked { background: #F5E0DE; color: #A2392F; }
  .pill.status-progress { background: #FBF0D9; color: #92701A; }
  .pill.status-done { background: var(--verified-bg); color: var(--verified); }
  .pill.status-notstarted { background: #ECE9E2; color: var(--muted); }

  .task-item, .ev-item {
    border-bottom: 1px solid var(--border); padding: 12px 0;
  }
  .task-item:last-child, .ev-item:last-child { border-bottom: none; }
  .task-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .task-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .task-notes { font-size: 12px; color: var(--muted); margin-top: 6px; font-style: italic; }

  .section-title {
    font-size: 12.5px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--muted); margin: 18px 0 8px;
  }
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13.5px; }
  .citation-tag {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px; background: var(--stone); padding: 2px 6px; border-radius: 5px;
    color: var(--river); display: inline-block; margin-top: 6px;
  }
  .claim-list { margin-top: 8px; padding-left: 0; list-style: none; }
  .claim-list li {
    font-size: 12.5px; padding: 6px 0 6px 10px; border-left: 2px solid var(--border);
    margin-bottom: 4px; color: var(--ink);
  }
  .claim-list li.superseded { color: var(--muted); text-decoration: line-through; }
  .loading, .error { text-align: center; padding: 30px; font-size: 13px; color: var(--muted); }
  .error { color: var(--unverified); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ---- CONFIG ----
// Replace with your Supabase project values before deploying.
const SUPABASE_URL = "https://kbfiozndfkwkoulebqg.supabase.co";
const SUPABASE_KEY = "sb_publishable_uWCrWVaNGEBUysynxujlxQ_xvEmwAkG";
const APPLICATION_ID = "11111111-1111-1111-1111-111111111111"; // Kaitangata 5E seed row

// ---- RAW FETCH HELPERS (no supabase-js — mobile-safe per lessons learned) ----
async function sbGet(table, query) {
  const url = `${SUPABASE_URL}/rest/v1/${table}?${query}`;
  const res = await fetch(url, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
    },
  });
  if (!res.ok) throw new Error(`Fetch failed: ${table}`);
  return res.json();
}

async function sbPatch(table, id, body) {
  const url = `${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`;
  const res = await fetch(url, {
    method: "PATCH",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      Prefer: "return=representation",
    },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`Update failed: ${table}`);
  return res.json();
}

const STAGE_NAMES = [
  "Assess Feasibility", "Ownership Analysis", "Professional Team",
  "Planning Review", "Survey", "Evidence Preparation",
  "Court Application", "Court Hearing", "Orders Issued", "Implementation",
];

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const diff = new Date(dateStr) - new Date();
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function VerificationPill({ status }) {
  const map = {
    primary_source_read: { cls: "verified", label: "Primary Source" },
    secondary_summary: { cls: "secondary", label: "Secondary Summary" },
    ai_generated_unverified: { cls: "unverified", label: "Unverified" },
  };
  const m = map[status] || map.ai_generated_unverified;
  return <span className={`pill ${m.cls}`}>{m.label}</span>;
}

function StatusPill({ status }) {
  const map = {
    not_started: { cls: "status-notstarted", label: "Not Started" },
    in_progress: { cls: "status-progress", label: "In Progress" },
    blocked: { cls: "status-blocked", label: "Blocked" },
    complete: { cls: "status-done", label: "Complete" },
  };
  const m = map[status] || map.not_started;
  return <span className={`pill ${m.cls}`}>{m.label}</span>;
}

function Dashboard({ app, tasks }) {
  if (!app) return <div className="empty">No application loaded.</div>;
  const days = daysUntil(app.hearing_date);
  const outstanding = tasks.filter(t => t.status !== "complete");
  const nextThree = outstanding.slice(0, 3);
  const stageIdx = app.current_stage;

  return (
    <div>
      <div className="card">
        <div className="row">
          <div>
            <h2>{app.block_name}</h2>
            <div className="stat-label">{app.applicant_name}</div>
          </div>
        </div>
        <div className="stage-bar">
          {STAGE_NAMES.map((_, i) => (
            <div key={i} className={`stage-seg ${i + 1 < stageIdx ? "done" : i + 1 === stageIdx ? "current" : ""}`} />
          ))}
        </div>
        <div className="stat-label">Stage {stageIdx} of 10 — {STAGE_NAMES[stageIdx - 1]}</div>
      </div>

      {days !== null && (
        <div className="card">
          <div className="stat-big">{days >= 0 ? days : 0}</div>
          <div className="stat-label">
            {days >= 0 ? "days until hearing" : "hearing date has passed"}
            {app.hearing_date ? ` — ${new Date(app.hearing_date).toLocaleDateString("en-NZ", { day: "numeric", month: "long", year: "numeric" })}` : ""}
          </div>
        </div>
      )}

      <div className="section-title">Next Steps ({outstanding.length} outstanding)</div>
      {nextThree.length === 0 ? (
        <div className="card empty">All tasks complete.</div>
      ) : (
        <div className="card">
          {nextThree.map(t => (
            <div className="task-item" key={t.id}>
              <div className="task-title">{t.title}</div>
              <div className="task-meta"><StatusPill status={t.status} /></div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Tasks({ tasks, onUpdateStatus }) {
  if (tasks.length === 0) return <div className="empty">No tasks yet.</div>;
  const cycle = { not_started: "in_progress", in_progress: "complete", complete: "not_started", blocked: "in_progress" };

  return (
    <div className="card">
      {tasks.map(t => (
        <div className="task-item" key={t.id}>
          <div className="row">
            <div style={{ flex: 1 }}>
              <div className="task-title">{t.title}</div>
              <div className="task-meta">
                <StatusPill status={t.status} />
                {t.service_method && <span style={{ marginLeft: 6 }}>via {t.service_method}</span>}
              </div>
              {t.notes && <div className="task-notes">{t.notes}</div>}
            </div>
          </div>
          <button
            onClick={() => onUpdateStatus(t.id, cycle[t.status] || "in_progress")}
            style={{ marginTop: 8, fontSize: 11, padding: "5px 10px", borderRadius: 8, border: "1px solid var(--border)", background: "var(--stone)", cursor: "pointer" }}
          >
            Mark as {cycle[t.status] === "complete" ? "Complete" : cycle[t.status] === "in_progress" ? "In Progress" : "Not Started"}
          </button>
        </div>
      ))}
    </div>
  );
}

function EvidenceLibrary({ evidence, claims }) {
  if (evidence.length === 0) return <div className="empty">No evidence records yet.</div>;

  return (
    <div>
      {evidence.map(ev => {
        const evClaims = claims.filter(c => c.evidence_id === ev.id);
        return (
          <div className="card ev-item" key={ev.id}>
            <div className="row">
              <div style={{ fontWeight: 700, fontSize: 13, textTransform: "capitalize" }}>
                {(ev.category || "document").replace(/_/g, " ")}
              </div>
              <VerificationPill status={ev.verification_status} />
            </div>
            {ev.source_citation && <div className="citation-tag">{ev.source_citation}</div>}
            {evClaims.length > 0 && (
              <ul className="claim-list">
                {evClaims.map(c => (
                  <li key={c.id} className={c.superseded_by ? "superseded" : ""}>
                    {c.claim_text}
                    {c.page_reference && <span style={{ color: "var(--muted)" }}> ({c.page_reference})</span>}
                  </li>
                ))}
              </ul>
            )}
          </div>
        );
      })}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("dashboard");
  const [app, setApp] = useState(null);
  const [tasks, setTasks] = useState([]);
  const [evidence, setEvidence] = useState([]);
  const [claims, setClaims] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  async function loadAll() {
    setLoading(true);
    setError(null);
    try {
      const [appRows, taskRows, evRows, claimRows] = await Promise.all([
        sbGet("cp_applications", `id=eq.${APPLICATION_ID}`),
        sbGet("cp_tasks", `application_id=eq.${APPLICATION_ID}&order=created_at.asc`),
        sbGet("cp_evidence", `application_id=eq.${APPLICATION_ID}&order=uploaded_at.asc`),
        sbGet("cp_claims", `order=created_at.asc`),
      ]);
      setApp(appRows[0] || null);
      setTasks(taskRows);
      setEvidence(evRows);
      setClaims(claimRows);
    } catch (e) {
      setError("Could not load data. Check your Supabase config at the top of this file.");
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { loadAll(); }, []);

  async function handleUpdateStatus(taskId, newStatus) {
    setTasks(prev => prev.map(t => t.id === taskId ? { ...t, status: newStatus } : t));
    try {
      await sbPatch("cp_tasks", taskId, { status: newStatus });
    } catch (e) {
      loadAll(); // revert on failure by reloading
    }
  }

  return (
    <div className="app">
      <header className="top">
        <h1>Combined Partition OS</h1>
        <div className="sub">{app ? app.block_name : "Loading..."}</div>
      </header>

      <div className="content">
        {loading && <div className="loading">Loading case data...</div>}
        {error && <div className="error">{error}</div>}
        {!loading && !error && tab === "dashboard" && <Dashboard app={app} tasks={tasks} />}
        {!loading && !error && tab === "tasks" && <Tasks tasks={tasks} onUpdateStatus={handleUpdateStatus} />}
        {!loading && !error && tab === "evidence" && <EvidenceLibrary evidence={evidence} claims={claims} />}
      </div>

      <nav className="tabs">
        <button className={tab === "dashboard" ? "active" : ""} onClick={() => setTab("dashboard")}>
          <span className="icon">◈</span>Dashboard
        </button>
        <button className={tab === "tasks" ? "active" : ""} onClick={() => setTab("tasks")}>
          <span className="icon">☑</span>Tasks
        </button>
        <button className={tab === "evidence" ? "active" : ""} onClick={() => setTab("evidence")}>
          <span className="icon">📄</span>Evidence
        </button>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
