<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Combined Partition OS</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1C3A4A" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
  :root{
    --ink:#1C3A4A;         /* river-blue, primary dark */
    --ink-light:#2E5266;
    --parchment:#F6F2E8;   /* background */
    --paper:#FFFFFF;
    --ochre:#B8792B;       /* fill/border only, never text */
    --ochre-dark:#5A3D14;  /* text-safe variant of ochre */
    --green:#2F5D3A;       /* verified */
    --green-bg:#E4EDE3;
    --rust:#9C4A3A;        /* unverified / at-risk */
    --rust-bg:#F3E3DF;
    --amber-bg:#F5E9D3;
    --line:#DFD6C2;
    --text:#2A2A28;
    --text-soft:#5C5A52;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--parchment); color:var(--text);
    font-family:'Inter',sans-serif; -webkit-tap-highlight-color:transparent;
  }
  h1,h2,h3{font-family:'Fraunces',serif; margin:0; color:var(--ink);}
  .mono{font-family:'JetBrains Mono',monospace;}
  #root{min-height:100vh; display:flex; flex-direction:column;}

  /* ---------- Login ---------- */
  .login-wrap{flex:1; display:flex; align-items:center; justify-content:center; padding:24px;}
  .login-card{background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:32px 28px; max-width:380px; width:100%; box-shadow:0 8px 24px rgba(28,58,74,0.08);}
  .login-card h1{font-size:26px; margin-bottom:4px;}
  .login-card p.sub{color:var(--text-soft); margin:0 0 24px; font-size:14px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; font-weight:600; color:var(--text-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em;}
  .field input{width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px; font-size:15px; background:var(--parchment);}
  .field input:focus{outline:2px solid var(--ink-light); outline-offset:1px;}
  .btn{width:100%; padding:12px; border:none; border-radius:8px; background:var(--ink); color:#fff; font-size:15px; font-weight:600; cursor:pointer;}
  .btn:active{background:var(--ink-light);}
  .err-msg{background:var(--rust-bg); color:var(--rust); border-radius:8px; padding:10px 12px; font-size:13px; margin-bottom:14px; border:1px solid var(--rust);}

  /* ---------- Shell ---------- */
  header.top{background:var(--ink); color:#fff; padding:16px 18px; display:flex; align-items:center; justify-content:space-between; gap:10px;}
  header.top h1{color:#fff; font-size:19px;}
  header.top .block{font-size:12px; opacity:.75; font-family:'JetBrains Mono',monospace;}
  header.top .right{display:flex; align-items:center; gap:12px;}
  .logout-btn{background:rgba(255,255,255,0.12); color:#fff; border:1px solid rgba(255,255,255,0.3); border-radius:7px; padding:6px 12px; font-size:12.5px; font-weight:600;}
  .logout-btn:active{background:rgba(255,255,255,0.22);}
  main{flex:1; padding:16px; padding-bottom:88px; max-width:720px; margin:0 auto; width:100%;}
  nav.tabs{position:fixed; bottom:0; left:0; right:0; background:var(--paper); border-top:1px solid var(--line); display:flex; padding:6px 6px calc(6px + env(safe-area-inset-bottom));}
  nav.tabs button{flex:1; background:none; border:none; padding:10px 4px; font-size:12px; font-weight:600; color:var(--text-soft); border-radius:8px;}
  nav.tabs button.active{color:var(--ink); background:var(--amber-bg);}

  /* ---------- Dashboard ---------- */
  .countdown{background:var(--ink); color:#fff; border-radius:14px; padding:20px; margin-bottom:18px; text-align:center;}
  .countdown .num{font-family:'Fraunces',serif; font-size:44px; font-weight:700; line-height:1;}
  .countdown .lbl{font-size:13px; opacity:.8; margin-top:4px;}
  .stagebar{display:flex; gap:4px; margin-bottom:6px;}
  .stagebar .seg{flex:1; height:8px; border-radius:4px; background:var(--line);}
  .seg.completed{background:var(--green);}
  .seg.to_be_confirmed{background:var(--ochre);}
  .seg.to_be_completed{background:var(--rust);}
  .stage-caption{font-size:12px; color:var(--text-soft); margin-bottom:20px;}
  .card{background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px;}
  .card h3{font-size:15px; margin-bottom:10px;}
  .task-row{display:flex; align-items:center; gap:10px; padding:8px 0; border-top:1px solid var(--line);}
  .task-row:first-child{border-top:none;}
  .dot{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
  .dot.open{background:var(--rust);}
  .dot.in_progress{background:var(--ochre);}
  .dot.done{background:var(--green);}
  .dot.blocked{background:#8a8a86;}
  .task-title{font-size:14px; flex:1;}

  /* ---------- Tasks page ---------- */
  .task-card{background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:10px; display:flex; gap:12px; align-items:flex-start;}
  .status-pill{font-size:11px; font-weight:600; padding:3px 9px; border-radius:99px; white-space:nowrap; text-transform:uppercase; letter-spacing:.03em;}
  .status-pill.open{background:var(--rust-bg); color:var(--rust);}
  .status-pill.in_progress{background:var(--amber-bg); color:var(--ochre-dark);}
  .status-pill.done{background:var(--green-bg); color:var(--green);}
  .status-pill.blocked{background:#eaeaea; color:#555;}
  .task-body h4{margin:0 0 4px; font-size:14.5px; color:var(--text);}
  .task-body p{margin:0; font-size:13px; color:var(--text-soft);}
  .task-due{font-size:11px; color:var(--text-soft); margin-top:6px;}
  .tap-hint{font-size:10px; color:var(--text-soft); margin-top:2px;}
  .task-actions{display:flex; flex-direction:column; align-items:center; gap:6px;}
  .done-btn{width:34px; height:34px; border-radius:50%; border:1.5px solid var(--green); background:#fff; color:var(--green); font-size:16px; font-weight:700; flex-shrink:0;}
  .done-btn.is-done{background:var(--green); color:#fff;}

  /* ---------- Evidence Library ---------- */
  .ev-card{background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:12px;}
  .ev-card h4{font-size:14.5px; margin:0 0 6px; color:var(--text);}
  .ev-card p.desc{font-size:13px; color:var(--text-soft); margin:0 0 10px;}
  .claim{border-left:3px solid var(--line); padding:8px 0 8px 12px; margin-top:8px;}
  .claim p{margin:0 0 6px; font-size:13.5px; line-height:1.45;}
  .citerow{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .citetag{font-family:'JetBrains Mono',monospace; font-size:11.5px; background:var(--ink); color:#fff; padding:3px 8px; border-radius:6px;}
  .verify-pill{font-size:10.5px; font-weight:600; padding:2px 8px; border-radius:99px; display:inline-flex; align-items:center; gap:5px;}
  .verify-pill.primary_source_read{background:var(--green-bg); color:var(--green);}
  .verify-pill.secondary_summary{background:var(--amber-bg); color:var(--ochre-dark);}
  .verify-pill.ai_generated_unverified{background:var(--rust-bg); color:var(--rust);}
  .verify-pill .vdot{width:6px; height:6px; border-radius:50%; display:inline-block;}
  .verify-pill.primary_source_read .vdot{background:var(--green);}
  .verify-pill.secondary_summary .vdot{background:var(--ochre);}
  .verify-pill.ai_generated_unverified .vdot{background:var(--rust);}

  .empty{text-align:center; color:var(--text-soft); font-size:14px; padding:40px 20px;}
  .search-box{width:100%; padding:11px 14px; border:1px solid var(--line); border-radius:10px; font-size:15px; background:var(--paper); margin-bottom:14px;}
  .search-box:focus{outline:2px solid var(--ink-light); outline-offset:1px;}
  .search-count{font-size:12px; color:var(--text-soft); margin:-6px 0 12px;}
  mark{background:var(--amber-bg); color:var(--ochre-dark); padding:0 2px; border-radius:2px;}
  .loading{text-align:center; color:var(--text-soft); padding:40px 0; font-size:14px;}
  .crash{padding:32px; text-align:center;}
  .crash h2{color:var(--rust);}
  .crash pre{white-space:pre-wrap; text-align:left; background:#fff; border:1px solid var(--line); border-radius:8px; padding:12px; font-size:11px; color:var(--text-soft);}
  .offline-banner{background:var(--ochre); color:var(--ochre-dark); font-weight:600; text-align:center; font-size:12.5px; padding:6px;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

// ============================================================
// CONFIG — replace before deploying
// ============================================================
const SUPABASE_URL = "https://iqxvqndfroegvhcipqkn.supabase.co";
const SUPABASE_KEY = "sb_publishable_sdBnR2sC_u8i6gFrydvcbA_8qBpTtbS";
const APPLICATION_ID = "11111111-1111-1111-1111-111111111111"; // Kaitangata 5E seed row

// ============================================================
// Lesson 6: ErrorBoundary — blank screen = invisible crash without it
// ============================================================
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error){ return { error }; }
  render(){
    if (this.state.error) {
      return (
        <div className="crash">
          <h2>Something went wrong</h2>
          <p>The app hit an error and stopped safely instead of showing a blank screen.</p>
          <pre>{String(this.state.error && this.state.error.message || this.state.error)}</pre>
        </div>
      );
    }
    return this.props.children;
  }
}

// ============================================================
// Lesson 26: translate raw auth/API errors into human guidance
// ============================================================
function humanizeError(raw) {
  const msg = (raw || "").toLowerCase();
  if (msg.includes("invalid login credentials"))
    return "Email or password not recognised — check for capital letters, passwords are case sensitive.";
  if (msg.includes("failed to fetch") || msg.includes("networkerror"))
    return "Could not reach the server. Check your connection, or the project may be paused.";
  if (msg.includes("jwt") && msg.includes("expired"))
    return "Your session expired — refreshing automatically. Try again in a moment.";
  return raw || "Something unexpected happened.";
}

// ============================================================
// Session handling — localStorage persistence (Lesson 5)
// ============================================================
function loadSession() {
  try {
    const raw = localStorage.getItem("cp_session");
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}
function saveSession(session) {
  if (session) localStorage.setItem("cp_session", JSON.stringify(session));
  else localStorage.removeItem("cp_session");
}
function clearSession() {
  localStorage.removeItem("cp_session");
}

// ============================================================
// Lesson 21: auto session refresh — catch 401, refresh token, retry once.
// Wraps every authenticated Supabase REST call.
// ============================================================
async function refreshSession(session) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY },
    body: JSON.stringify({ refresh_token: session.refresh_token }),
  });
  if (!res.ok) throw new Error("Session refresh failed — please log in again.");
  const data = await res.json();
  const newSession = {
    access_token: data.access_token,
    refresh_token: data.refresh_token,
    expires_at: Date.now() + (data.expires_in || 3600) * 1000,
  };
  saveSession(newSession);
  return newSession;
}

async function apiFetch(session, path, options = {}, setSession) {
  const doFetch = (tok) => fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${tok}`,
      "Prefer": options.prefer || "return=representation",
      ...(options.headers || {}),
    },
  });

  let res = await doFetch(session.access_token);
  if (res.status === 401) {
    // Lesson 21 in action: refresh once, retry once, then give up cleanly.
    const refreshed = await refreshSession(session);
    setSession(refreshed);
    res = await doFetch(refreshed.access_token);
  }
  if (!res.ok) {
    const text = await res.text().catch(() => "");
    // Lesson 19: surface e.message-style detail instead of a generic failure.
    throw new Error(`Request failed (${res.status}): ${text || res.statusText}`);
  }
  return res.json();
}

// ============================================================
// Login screen
// ============================================================
function Login({ onLoggedIn }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [err, setErr] = useState(null);
  const [busy, setBusy] = useState(false);

  async function submit(e) {
    e.preventDefault();
    setBusy(true); setErr(null);
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error_description || data.msg || "Invalid login credentials");
      const session = {
        access_token: data.access_token,
        refresh_token: data.refresh_token,
        expires_at: Date.now() + (data.expires_in || 3600) * 1000,
      };
      saveSession(session);
      onLoggedIn(session);
    } catch (e) {
      setErr(humanizeError(e.message));
    } finally {
      setBusy(false);
    }
  }

  return (
    <div className="login-wrap">
      <form className="login-card" onSubmit={submit}>
        <h1>Combined Partition OS</h1>
        <p className="sub">Kaitangata 5E — citation-first case tracker</p>
        {err && <div className="err-msg">{err}</div>}
        <div className="field">
          <label>Email</label>
          <input type="email" value={email} onChange={e => setEmail(e.target.value)} required autoComplete="username" />
        </div>
        <div className="field">
          <label>Password</label>
          <input type="password" value={password} onChange={e => setPassword(e.target.value)} required autoComplete="current-password" />
        </div>
        <button className="btn" disabled={busy}>{busy ? "Signing in…" : "Sign in"}</button>
      </form>
    </div>
  );
}

// ============================================================
// Dashboard
// ============================================================
function Dashboard({ app, stages, tasks }) {
  const daysLeft = app ? Math.ceil((new Date(app.hearing_date) - new Date()) / 86400000) : null;
  const openTasks = tasks.filter(t => t.status !== "done").slice(0, 3);

  return (
    <div>
      <div className="countdown">
        <div className="num">{daysLeft !== null ? daysLeft : "–"}</div>
        <div className="lbl">days until hearing {app ? `· ${app.hearing_date}` : ""}</div>
      </div>

      <div className="stagebar">
        {stages.map(s => <div key={s.id} className={`seg ${s.status}`} title={s.title}></div>)}
      </div>
      <div className="stage-caption">
        {stages.filter(s => s.status === "completed").length} of {stages.length} standing-direction items complete
      </div>

      <div className="card">
        <h3>Next up</h3>
        {openTasks.length === 0 && <div className="empty">Nothing open — nicely done.</div>}
        {openTasks.map(t => (
          <div className="task-row" key={t.id}>
            <span className={`dot ${t.status}`}></span>
            <span className="task-title">{t.title}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ============================================================
// Tasks — tap to cycle status
// ============================================================
const TASK_CYCLE = ["open", "in_progress", "done", "blocked"];

function Tasks({ tasks, onCycle, onToggleDone }) {
  if (!tasks.length) return <div className="empty">No tasks yet.</div>;
  return (
    <div>
      {tasks.map(t => (
        <div className="task-card" key={t.id}>
          <div className="task-actions">
            <button
              className={`done-btn ${t.status === "done" ? "is-done" : ""}`}
              onClick={(e) => { e.stopPropagation(); onToggleDone(t); }}
              aria-label={t.status === "done" ? "Mark not done" : "Mark done"}
            >
              ✓
            </button>
            <span className={`status-pill ${t.status}`}>{t.status.replace("_"," ")}</span>
          </div>
          <div className="task-body" onClick={() => onCycle(t)}>
            <h4>{t.title}</h4>
            {t.detail && <p>{t.detail}</p>}
            {t.due_date && <div className="task-due">Due {t.due_date}</div>}
            <div className="tap-hint">Tap card to cycle status · tap ✓ to mark done</div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ============================================================
// Evidence Library — the core differentiator
// ============================================================
function verifyLabel(status){
  if (status === "primary_source_read") return "Primary source read";
  if (status === "secondary_summary") return "Secondary summary";
  return "AI-generated, unverified";
}

function highlightMatch(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return (
    <React.Fragment>
      {text.slice(0, idx)}
      <mark>{text.slice(idx, idx + query.length)}</mark>
      {text.slice(idx + query.length)}
    </React.Fragment>
  );
}

function Evidence({ evidence, claims }) {
  const [query, setQuery] = useState("");
  const q = query.trim().toLowerCase();

  function claimMatches(c) {
    if (!q) return true;
    return (
      c.claim_text.toLowerCase().includes(q) ||
      c.page_reference.toLowerCase().includes(q) ||
      verifyLabel(c.verification_status).toLowerCase().includes(q)
    );
  }
  function evidenceMatches(ev) {
    if (!q) return true;
    const ownMatch = ev.title.toLowerCase().includes(q) ||
      (ev.description || "").toLowerCase().includes(q);
    const anyClaimMatch = claims.some(c => c.evidence_id === ev.id && claimMatches(c));
    return ownMatch || anyClaimMatch;
  }

  const filtered = evidence.filter(evidenceMatches);

  return (
    <div>
      <input
        className="search-box"
        type="text"
        placeholder="Search title, claim text, or citation (e.g. 103 AOT)"
        value={query}
        onChange={e => setQuery(e.target.value)}
      />
      {q && <div className="search-count">{filtered.length} of {evidence.length} match "{query}"</div>}

      {filtered.length === 0 && (
        <div className="empty">{q ? `No evidence matches "${query}".` : "No evidence records yet."}</div>
      )}

      {filtered.map(ev => {
        const linkedClaims = claims.filter(c => c.evidence_id === ev.id && (!q || claimMatches(c) || ev.title.toLowerCase().includes(q) || (ev.description||"").toLowerCase().includes(q)));
        return (
          <div className="ev-card" key={ev.id}>
            <h4>{highlightMatch(ev.title, query)}</h4>
            {ev.description && <p className="desc">{highlightMatch(ev.description, query)}</p>}
            {linkedClaims.map(c => (
              <div className="claim" key={c.id}>
                <p>{highlightMatch(c.claim_text, query)}</p>
                <div className="citerow">
                  <span className="citetag">{highlightMatch(c.page_reference, query)}</span>
                  <span className={`verify-pill ${c.verification_status}`}>
                    <span className="vdot"></span>{verifyLabel(c.verification_status)}
                  </span>
                </div>
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ============================================================
// App shell
// ============================================================
function App() {
  const [session, setSessionState] = useState(loadSession());
  const [tab, setTab] = useState("dashboard");
  const [app, setApp] = useState(null);
  const [stages, setStages] = useState([]);
  const [tasks, setTasks] = useState([]);
  const [evidence, setEvidence] = useState([]);
  const [claims, setClaims] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [online, setOnline] = useState(navigator.onLine);

  const setSession = useCallback((s) => { setSessionState(s); saveSession(s); }, []);

  useEffect(() => {
    const on = () => setOnline(true), off = () => setOnline(false);
    window.addEventListener("online", on);
    window.addEventListener("offline", off);
    return () => { window.removeEventListener("online", on); window.removeEventListener("offline", off); };
  }, []);

  const loadData = useCallback(async () => {
    if (!session) return;
    setLoading(true); setError(null);
    try {
      const [apps, st, tk, ev, cl] = await Promise.all([
        apiFetch(session, `cp_applications?id=eq.${APPLICATION_ID}`, {}, setSession),
        apiFetch(session, `cp_stages?application_id=eq.${APPLICATION_ID}&order=stage_order.asc`, {}, setSession),
        apiFetch(session, `cp_tasks?application_id=eq.${APPLICATION_ID}&order=created_at.asc`, {}, setSession),
        apiFetch(session, `cp_evidence?application_id=eq.${APPLICATION_ID}`, {}, setSession),
        apiFetch(session, `cp_claims?application_id=eq.${APPLICATION_ID}`, {}, setSession),
      ]);
      setApp(apps[0] || null);
      setStages(st); setTasks(tk); setEvidence(ev); setClaims(cl);
    } catch (e) {
      setError(humanizeError(e.message));
    } finally {
      setLoading(false);
    }
  }, [session, setSession]);

  useEffect(() => { loadData(); }, [loadData]);

  async function updateTaskStatus(taskId, next) {
    setTasks(ts => ts.map(t => t.id === taskId ? { ...t, status: next } : t)); // optimistic
    try {
      await apiFetch(session, `cp_tasks?id=eq.${taskId}`, {
        method: "PATCH",
        body: JSON.stringify({ status: next }),
      }, setSession);
    } catch (e) {
      setError(humanizeError(e.message));
      loadData(); // revert to server truth on failure
    }
  }

  function cycleTask(task) {
    const next = TASK_CYCLE[(TASK_CYCLE.indexOf(task.status) + 1) % TASK_CYCLE.length];
    updateTaskStatus(task.id, next);
  }

  function toggleDoneTask(task) {
    updateTaskStatus(task.id, task.status === "done" ? "open" : "done");
  }

  if (!session) return <Login onLoggedIn={setSession} />;

  return (
    <React.Fragment>
      {!online && <div className="offline-banner">Offline — showing last loaded data</div>}
      <header className="top">
        <h1>Combined Partition OS</h1>
        <div className="right">
          <span className="block mono">{app ? app.block_name : "…"}</span>
          <button className="logout-btn" onClick={() => { clearSession(); setSessionState(null); }}>
            Log out
          </button>
        </div>
      </header>
      <main>
        {loading && <div className="loading">Loading…</div>}
        {error && <div className="err-msg">{error}</div>}
        {!loading && !error && tab === "dashboard" && <Dashboard app={app} stages={stages} tasks={tasks} />}
        {!loading && !error && tab === "tasks" && <Tasks tasks={tasks} onCycle={cycleTask} onToggleDone={toggleDoneTask} />}
        {!loading && !error && tab === "evidence" && <Evidence evidence={evidence} claims={claims} />}
      </main>
      <nav className="tabs">
        <button className={tab === "dashboard" ? "active" : ""} onClick={() => setTab("dashboard")}>Dashboard</button>
        <button className={tab === "tasks" ? "active" : ""} onClick={() => setTab("tasks")}>Tasks</button>
        <button className={tab === "evidence" ? "active" : ""} onClick={() => setTab("evidence")}>Evidence</button>
      </nav>
    </React.Fragment>
  );
}

// Lesson 25: register the service worker — manifest.json alone is not a PWA
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
